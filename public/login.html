<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>studio · sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fraunces:ital,opsz,wght@1,9..144,300;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0D1821;
    --ink-2: #1f2d3a;
    --muted: #5a6573;
    --faint: #8c95a0;
    --hair: #e6e8eb;
    --bg: #fafbfb;
    --paper: #ffffff;
    --sage: #BFCC94;
    --sage-deep: #97a570;
    --sage-soft: #e9eed8;
    --blush: #E6AACE;
    --blush-soft: #f6e2ee;
    --serif: "Fraunces", Georgia, serif;
    --sans: "Inter", -apple-system, "Helvetica Neue", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: var(--sans); color: var(--ink); background: var(--bg);
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.01em; line-height: 1.5;
    position: relative;
  }

  /* ───── Ambient drifting background ───── */
  .canvas {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden;
    background:
      radial-gradient(circle at 20% 30%, rgba(191, 204, 148, 0.10), transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(230, 170, 206, 0.07), transparent 50%),
      var(--bg);
  }
  .orb {
    position: absolute; border-radius: 50%;
    filter: blur(80px); opacity: 0.6;
    animation: drift 28s ease-in-out infinite;
    will-change: transform;
  }
  .orb.a {
    width: 480px; height: 480px;
    background: var(--sage);
    top: -120px; left: -120px;
    animation-duration: 32s;
  }
  .orb.b {
    width: 380px; height: 380px;
    background: var(--blush);
    bottom: -80px; right: -100px;
    animation-duration: 24s; animation-direction: reverse;
    animation-delay: -8s;
  }
  .orb.c {
    width: 280px; height: 280px;
    background: var(--sage-soft);
    top: 45%; left: 55%;
    opacity: 0.4;
    animation-duration: 40s;
    animation-delay: -16s;
  }
  @keyframes drift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25%      { transform: translate(80px, 40px) scale(1.08); }
    50%      { transform: translate(40px, 100px) scale(0.95); }
    75%      { transform: translate(-50px, 60px) scale(1.05); }
  }

  /* Grain — subtle paper texture */
  .grain {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
    opacity: 0.04;
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9'/></filter><rect width='400' height='400' filter='url(%23n)'/></svg>");
  }

  /* ───── Layout ───── */
  .wrap {
    position: relative; z-index: 2;
    height: 100%;
    display: grid;
    grid-template-rows: 1fr auto;
    padding: 36px 48px;
  }
  @media (max-width: 600px) { .wrap { padding: 24px 28px; } }

  .top-row {
    display: flex; justify-content: space-between;
    align-items: flex-start; grid-row: 1;
  }
  .brand {
    display: flex; align-items: center; gap: 12px;
    font-size: 16px; font-weight: 500;
    letter-spacing: -0.015em;
  }
  .brand-mark {
    width: 28px; height: 28px; border-radius: 7px;
    background: var(--ink); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
  }
  .nav-right {
    display: flex; gap: 8px; align-items: center;
  }
  .sound-toggle {
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(8px);
    border: 1px solid var(--hair);
    padding: 7px 13px;
    border-radius: 999px;
    font-family: inherit; font-size: 12px;
    color: var(--ink-2);
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: all 0.2s;
  }
  .sound-toggle:hover { background: var(--paper); }
  .sound-toggle.on {
    background: var(--ink); color: #fff; border-color: var(--ink);
  }
  .sound-toggle.on .sound-dot { background: var(--sage); animation: pulse 1.4s ease-in-out infinite; }
  .sound-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--fainter, #b8bec6);
    transition: background 0.2s;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(0.9); }
    50%      { opacity: 1; transform: scale(1.15); }
  }

  /* ───── Center ───── */
  .center {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100%; max-width: 460px;
    padding: 0 32px;
    text-align: center;
  }

  .greeting {
    font-family: var(--serif);
    font-style: italic; font-weight: 300;
    font-size: 18px; color: var(--muted);
    margin-bottom: 12px;
    letter-spacing: -0.01em;
    animation: rise 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) 0.1s backwards;
  }
  .title {
    font-size: 56px; font-weight: 300;
    letter-spacing: -0.04em;
    line-height: 1.0;
    margin-bottom: 18px;
    animation: rise 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) 0.25s backwards;
  }
  .title em {
    font-family: var(--serif);
    font-style: italic; font-weight: 300;
    color: var(--sage-deep);
  }
  @media (max-width: 600px) { .title { font-size: 40px; } }
  .sub {
    font-size: 14.5px; color: var(--muted);
    max-width: 340px; margin: 0 auto 36px;
    line-height: 1.55;
    animation: rise 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) 0.4s backwards;
  }

  .form {
    display: flex; gap: 8px;
    background: var(--paper);
    border: 1px solid var(--hair);
    padding: 6px;
    border-radius: 999px;
    box-shadow: 0 18px 50px -25px rgba(13, 24, 33, 0.18);
    animation: rise 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) 0.55s backwards;
  }
  .form input {
    flex: 1; padding: 11px 18px;
    border: none; outline: none; background: transparent;
    font-family: inherit; font-size: 14px;
    color: var(--ink);
    letter-spacing: -0.005em;
  }
  .form input::placeholder { color: var(--faint); }
  .form button {
    padding: 11px 20px;
    background: var(--ink); color: #fff;
    border: none; border-radius: 999px;
    font-family: inherit; font-size: 13.5px; font-weight: 500;
    cursor: pointer;
    letter-spacing: -0.005em;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .form button:hover { background: #000; transform: translateY(-1px); }
  .form button .arrow {
    transition: transform 0.2s;
  }
  .form button:hover .arrow { transform: translateX(2px); }

  .footnote {
    font-size: 12px; color: var(--faint);
    margin-top: 22px;
    animation: rise 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) 0.7s backwards;
  }

  .success {
    display: none;
    animation: rise 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .success.on { display: block; }
  .success-icon {
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--sage-soft);
    color: var(--sage-deep);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    margin: 0 auto 18px;
  }

  /* ───── Bottom row ───── */
  .bottom-row {
    grid-row: 2;
    display: flex; justify-content: space-between;
    align-items: flex-end;
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.06em; text-transform: uppercase;
    padding-top: 24px;
  }
  .bottom-row a { color: var(--ink-2); text-decoration: none; }

  .bottom-clock {
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- Ambient drifting orbs -->
<div class="canvas">
  <div class="orb a"></div>
  <div class="orb b"></div>
  <div class="orb c"></div>
</div>
<div class="grain"></div>

<div class="wrap">

  <div class="top-row">
    <div class="brand">
      <div class="brand-mark">S</div>
      <span>Studio</span>
    </div>
    <div class="nav-right">
      <button class="sound-toggle" id="snd" onclick="toggleSound()">
        <span class="sound-dot"></span>
        <span id="snd-label">Sound off</span>
      </button>
    </div>
  </div>

  <div class="center">
    <div class="form-state" id="form-state">
      <div class="greeting">welcome back,</div>
      <div class="title">a quiet place<br/>to <em>build</em>.</div>
      <div class="sub">your studio · your companies · your day. sign in with a magic link to get to work.</div>
      <form class="form" onsubmit="handleSubmit(event)">
        <input type="email" id="email" placeholder="diana@yourdomain.com" required autocomplete="email" />
        <button type="submit">Send link <span class="arrow">→</span></button>
      </form>
      <div class="footnote">no passwords. ever.</div>
    </div>

    <div class="success" id="success">
      <div class="success-icon">✓</div>
      <div class="title" style="font-size: 36px;">check your <em>inbox</em>.</div>
      <div class="sub">we sent a sign-in link to <strong id="sent-email" style="color: var(--ink); font-weight: 500;"></strong>. it expires in 15 minutes.</div>
      <div class="footnote"><a href="#" onclick="reset(event)" style="color: var(--ink-2); border-bottom: 1px dotted var(--hair);">Use a different email</a></div>
    </div>
  </div>

  <div class="bottom-row">
    <div>est. 2026 · atlanta</div>
    <div class="bottom-clock" id="clock">—</div>
  </div>

</div>

<script>
  // Live clock
  function tick() {
    const d = new Date();
    const t = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('clock').textContent = t;
  }
  tick();
  setInterval(tick, 30000);

  // Magic-link mock
  function handleSubmit(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email) return;
    document.getElementById('sent-email').textContent = email;
    document.getElementById('form-state').style.display = 'none';
    document.getElementById('success').classList.add('on');
  }
  function reset(e) {
    e.preventDefault();
    document.getElementById('success').classList.remove('on');
    document.getElementById('form-state').style.display = 'block';
    document.getElementById('email').focus();
  }

  // Ambient sound — Web Audio API, simple pad
  let audioCtx = null;
  let gainNode = null;
  let soundOn = false;
  function toggleSound() {
    const btn = document.getElementById('snd');
    const label = document.getElementById('snd-label');
    if (!soundOn) {
      // Init audio context lazily
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        gainNode = audioCtx.createGain();
        gainNode.gain.value = 0;
        gainNode.connect(audioCtx.destination);
        // Two soft drone oscillators + slow LFO
        const o1 = audioCtx.createOscillator();
        o1.type = 'sine'; o1.frequency.value = 110; // A2
        const o2 = audioCtx.createOscillator();
        o2.type = 'sine'; o2.frequency.value = 165; // E3 — perfect fifth
        const o3 = audioCtx.createOscillator();
        o3.type = 'sine'; o3.frequency.value = 220.5; // A3 detuned slightly
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass'; filter.frequency.value = 800; filter.Q.value = 0.5;
        const lfo = audioCtx.createOscillator();
        lfo.type = 'sine'; lfo.frequency.value = 0.08;
        const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 0.005;
        lfo.connect(lfoGain).connect(gainNode.gain);
        o1.connect(filter); o2.connect(filter); o3.connect(filter);
        filter.connect(gainNode);
        o1.start(); o2.start(); o3.start(); lfo.start();
      }
      // Fade in
      const now = audioCtx.currentTime;
      gainNode.gain.cancelScheduledValues(now);
      gainNode.gain.setValueAtTime(gainNode.gain.value, now);
      gainNode.gain.linearRampToValueAtTime(0.04, now + 2.0);
      btn.classList.add('on');
      label.textContent = 'Sound on';
      soundOn = true;
    } else {
      const now = audioCtx.currentTime;
      gainNode.gain.cancelScheduledValues(now);
      gainNode.gain.setValueAtTime(gainNode.gain.value, now);
      gainNode.gain.linearRampToValueAtTime(0, now + 1.0);
      btn.classList.remove('on');
      label.textContent = 'Sound off';
      soundOn = false;
    }
  }
</script>

</body>
</html>
